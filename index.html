<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 4 | Responsive System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- SYSTEM DESIGN TOKENS --- */
        :root {
            --bg-canvas: #f8fafc;
            --bg-surface: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-input: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-ui: #e2e8f0;
            --accent-primary: #2563eb;
            --accent-hover: #1d4ed8;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
            --sidebar-width: 280px;
        }

        [data-theme="dark"] {
            --bg-canvas: #020617;
            --bg-surface: #1e293b;
            --bg-sidebar: #020617;
            --bg-input: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-ui: #334155;
            --accent-primary: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- AUTHENTICATION --- */
        #auth-gate {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            outline: none;
        }

        .auth-submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
        }

        /* --- MOBILE HAMBURGER HEADER --- */
        .mobile-header {
            display: none;
            height: 60px;
            background: var(--bg-sidebar);
            color: white;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .hamburger {
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            transition: transform 0.3s ease;
            z-index: 999;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 40px;
        }

        .sidebar-brand span { color: var(--accent-primary); }

        .nav-link {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-link.active {
            background: var(--accent-primary);
            color: #ffffff;
        }

        /* --- MAIN CONTENT --- */
        #main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 70px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-ui);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .view-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        /* --- CARDS & FORMS --- */
        .card {
            background: var(--bg-surface);
            border-radius: 20px;
            border: 1px solid var(--border-ui);
            margin-bottom: 30px;
        }

        .form-layout {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-field { display: flex; flex-direction: column; gap: 8px; }
        .form-field input, .form-field select {
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            color: var(--text-primary);
        }

        /* --- TABLE RESPONSIVENESS --- */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border-ui); text-align: left; }

        /* --- STATS GRID --- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { background: var(--bg-surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border-ui); }
        .stat-card .value { font-size: 1.8rem; font-weight: 800; }

        /* --- BUTTONS --- */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border-ui); color: var(--text-primary); }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 1024px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            #main-view { padding-top: 60px; }
            header { display: none; } /* Pinagsama na sa mobile header ang search sa tablet/phone */
        }

        @media (max-width: 600px) {
            .view-scroller { padding: 15px; }
            .stat-grid { grid-template-columns: 1fr 1fr; }
            .auth-container { padding: 20px; }
            .card-header h3 { font-size: 0.9rem; }
        }

        .hidden { display: none !important; }
        .badge { padding: 4px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; }
        .badge-success { background: #10b98122; color: var(--color-success); }
        .badge-danger { background: #ef444422; color: var(--color-danger); }
        .badge-warning { background: #f59e0b22; color: var(--color-warning); }
    </style>
</head>
<body data-theme="light">

    <div class="mobile-header" id="mobile-nav-bar">
        <div class="hamburger" onclick="portal.toggleMobileSidebar()">☰</div>
        <div style="font-weight: 800; font-size: 1.1rem;">GROUP 4 SYSTEM</div>
    </div>

    <div id="auth-gate">
        <div class="auth-container" id="login-form">
            <h1>Login</h1>
            <p style="margin-bottom: 20px; color: #64748b;">Territory Management System</p>
            <input type="text" id="auth-u" class="auth-input" placeholder="Username">
            <input type="password" id="auth-p" class="auth-input" placeholder="Password">
            <button class="auth-submit-btn" onclick="portal.login()">Verify Credentials</button>
            <p style="margin-top:20px; font-size: 0.8rem; cursor:pointer;" onclick="portal.toggleAuth()">Need access? Request here</p>
        </div>

        <div class="auth-container hidden" id="register-form">
            <h1>Request Access</h1>
            <input type="text" id="reg-u" class="auth-input" placeholder="Proposed Username">
            <input type="password" id="reg-p" class="auth-input" placeholder="Secure Password">
            <button class="auth-submit-btn" onclick="portal.register()">Submit Request</button>
            <p style="margin-top:20px; font-size: 0.8rem; cursor:pointer;" onclick="portal.toggleAuth()">Back to login</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-brand">GROUP <span>4</span></div>
        
        <div class="nav-link active" id="nav-T1" onclick="portal.navigate('T1')">Unit 01</div>
        <div class="nav-link" id="nav-T2" onclick="portal.navigate('T2')">Unit 02</div>
        <div class="nav-link" id="nav-T3" onclick="portal.navigate('T3')">Unit 03</div>
        <div class="nav-link" id="nav-ALL" onclick="portal.navigate('ALL')">Global Registry</div>
        <div class="nav-link" id="nav-USERS" onclick="portal.navigate('USERS')">User Access</div>
        <div class="nav-link" id="nav-DASH" onclick="portal.navigate('DASH')">Analytics</div>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #334155;">
            <p id="display-user" style="color: white; font-weight: 700;"></p>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--color-danger); cursor:pointer; font-size:0.8rem; margin-top:10px;">LOGOUT</button>
        </div>
    </div>

    <div id="main-view" class="hidden">
        <header>
            <input type="text" class="auth-input" style="width: 300px; margin: 0;" placeholder="Search records..." onkeyup="portal.search(this.value)">
            <div style="display:flex; gap: 15px; align-items:center;">
                <button class="btn btn-ghost" onclick="portal.toggleTheme()">🌓 Theme</button>
                <div id="live-clock" style="font-weight: 600;"></div>
            </div>
        </header>

        <div class="view-scroller">
            <div style="margin-bottom: 25px;">
                <h1 id="view-title">Unit 01 Management</h1>
                <button class="btn btn-primary" onclick="portal.exportCSV()" style="margin-top:10px;">Export CSV</button>
            </div>

            <div id="ui-dash" class="hidden">
                <div class="stat-grid">
                    <div class="stat-card"><label>Unit 01</label><div class="value" id="val-t1">0</div></div>
                    <div class="stat-card"><label>Unit 02</label><div class="value" id="val-t2">0</div></div>
                    <div class="stat-card"><label>Unit 03</label><div class="value" id="val-t3">0</div></div>
                    <div class="stat-card" style="border-left: 5px solid var(--color-success);"><label>Total</label><div class="value" id="val-all">0</div></div>
                </div>
            </div>

            <div id="ui-form" class="card">
                <div class="form-layout">
                    <input type="hidden" id="f-id">
                    <div class="form-field"><label>Street</label><input type="text" id="f-street"></div>
                    <div class="form-field"><label>HH#</label><input type="text" id="f-unit"></div>
                    <div class="form-field"><label>Resident Name</label><input type="text" id="f-name"></div>
                    <div class="form-field">
                        <label>Status</label>
                        <select id="f-status" onchange="portal.handleDynamicConfig(this, 'statuses')"></select>
                    </div>
                    <div class="form-field">
                        <label>Language</label>
                        <select id="f-lang" onchange="portal.handleDynamicConfig(this, 'languages')"></select>
                    </div>
                    <div class="form-field"><label>Remarks</label><input type="text" id="f-remarks"></div>
                </div>
                <div style="padding: 0 24px 24px; display:flex; gap:10px;">
                    <button class="btn btn-ghost" id="btn-cancel" style="display:none;" onclick="portal.cancelEdit()">Cancel</button>
                    <button class="btn btn-primary" id="btn-save" style="flex:1;" onclick="portal.saveRecord()">Save Record</button>
                </div>
            </div>

            <div id="ui-users" class="card hidden">
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>User</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="user-registry-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="ui-table" class="card">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr><th>Street</th><th>HH#</th><th>Resident</th><th>Status</th><th>Lang</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="master-data-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LAHAT NG LOGIC MO AY NANDITO PARIN, DINAGDAGAN LANG NG MOBILE TOGGLE
        const portal = {
            store: JSON.parse(localStorage.getItem('g4_enterprise_core')) || {
                users: [{u: "admin", p: "admin123", s: "active"}],
                records: [],
                config: { 
                    languages: ['Tagalog', 'English', 'Ilocano'], 
                    statuses: ['At Home', 'Not at Home', 'Refused Entry']
                }
            },
            
            activeView: 'T1',
            currentUser: null,
            editingId: null,
            theme: 'light',

            toggleMobileSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
            },

            toggleTheme() {
                this.theme = this.theme === 'light' ? 'dark' : 'light';
                document.body.setAttribute('data-theme', this.theme);
            },

            toggleAuth() {
                document.getElementById('login-form').classList.toggle('hidden');
                document.getElementById('register-form').classList.toggle('hidden');
            },

            login() {
                const u = document.getElementById('auth-u').value;
                const p = document.getElementById('auth-p').value;
                const user = this.store.users.find(x => x.u === u && x.p === p);

                if (user) {
                    if (user.s !== "active") return alert("ACCESS DENIED: Awaiting approval.");
                    this.currentUser = u;
                    document.getElementById('auth-gate').classList.add('hidden');
                    document.getElementById('main-view').classList.remove('hidden');
                    document.getElementById('display-user').innerText = "User: " + u.toUpperCase();
                    this.initializeConfigUI();
                    this.renderRecords();
                } else {
                    alert("Invalid Credentials");
                }
            },

            register() {
                const u = document.getElementById('reg-u').value;
                const p = document.getElementById('reg-p').value;
                if (!u || !p) return alert("Fill all fields");
                this.store.users.push({ u, p, s: "pending" });
                this.persist();
                alert("Request Sent!");
                this.toggleAuth();
            },

            navigate(viewId) {
                this.activeView = viewId;
                this.cancelEdit();
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById('nav-' + viewId).classList.add('active');
                
                const titles = { 'T1': 'Unit 01', 'T2': 'Unit 02', 'T3': 'Unit 03', 'ALL': 'Global Registry', 'USERS': 'User Access', 'DASH': 'Analytics' };
                document.getElementById('view-title').innerText = titles[viewId];

                document.getElementById('ui-form').classList.toggle('hidden', ['ALL','USERS','DASH'].includes(viewId));
                document.getElementById('ui-table').classList.toggle('hidden', ['USERS','DASH'].includes(viewId));
                document.getElementById('ui-users').classList.toggle('hidden', viewId !== 'USERS');
                document.getElementById('ui-dash').classList.toggle('hidden', viewId !== 'DASH');

                if (viewId === 'USERS') this.renderUserRegistry();
                if (viewId === 'DASH') this.updateAnalytics();
                this.renderRecords();

                // Close sidebar on mobile after clicking
                if(window.innerWidth < 1024) this.toggleMobileSidebar();
            },

            saveRecord() {
                const payload = {
                    street: document.getElementById('f-street').value,
                    unit: document.getElementById('f-unit').value,
                    name: document.getElementById('f-name').value,
                    status: document.getElementById('f-status').value,
                    lang: document.getElementById('f-lang').value,
                    remarks: document.getElementById('f-remarks').value,
                };

                if (!payload.street || !payload.name) return alert("Street and Name required");

                if (this.editingId) {
                    const idx = this.store.records.findIndex(r => r.id === this.editingId);
                    this.store.records[idx] = { ...this.store.records[idx], ...payload };
                } else {
                    this.store.records.push({ ...payload, id: Date.now(), territory: this.activeView, creator: this.currentUser });
                }

                this.persist();
                this.renderRecords();
                this.cancelEdit();
            },

            editRecord(id) {
                const r = this.store.records.find(x => x.id === id);
                document.getElementById('f-street').value = r.street;
                document.getElementById('f-unit').value = r.unit;
                document.getElementById('f-name').value = r.name;
                document.getElementById('f-status').value = r.status;
                document.getElementById('f-lang').value = r.lang;
                document.getElementById('f-remarks').value = r.remarks;
                this.editingId = id;
                document.getElementById('btn-save').innerText = "Update Record";
                document.getElementById('btn-cancel').style.display = "inline-flex";
            },

            cancelEdit() {
                ['f-street', 'f-unit', 'f-name', 'f-remarks'].forEach(id => document.getElementById(id).value = '');
                this.editingId = null;
                document.getElementById('btn-save').innerText = "Save Record";
                document.getElementById('btn-cancel').style.display = "none";
            },

            renderRecords(filteredSet = null) {
                const container = document.getElementById('master-data-body');
                container.innerHTML = '';
                const dataSet = filteredSet || (this.activeView === 'ALL' ? this.store.records : this.store.records.filter(r => r.territory === this.activeView));
                
                dataSet.forEach(r => {
                    const badgeClass = r.status === 'At Home' ? 'badge-success' : (r.status === 'Not at Home' ? 'badge-danger' : 'badge-warning');
                    container.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>${r.street}</td>
                            <td>${r.unit}</td>
                            <td><b>${r.name}</b></td>
                            <td><span class="badge ${badgeClass}">${r.status}</span></td>
                            <td>${r.lang}</td>
                            <td>
                                <button onclick="portal.editRecord(${r.id})" style="color:blue; background:none; border:none; cursor:pointer;">Edit</button> |
                                <button onclick="portal.deleteRecord(${r.id})" style="color:red; background:none; border:none; cursor:pointer;">Del</button>
                            </td>
                        </tr>
                    `);
                });
            },

            deleteRecord(id) {
                if(confirm("Delete?")) {
                    this.store.records = this.store.records.filter(r => r.id !== id);
                    this.persist();
                    this.renderRecords();
                }
            },

            renderUserRegistry() {
                const container = document.getElementById('user-registry-body');
                container.innerHTML = '';
                this.store.users.forEach(u => {
                    if (u.u === 'admin') return;
                    container.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>${u.u}</td>
                            <td><span class="badge ${u.s === 'active' ? 'badge-success' : 'badge-warning'}">${u.s}</span></td>
                            <td>
                                <button class="btn btn-primary" style="padding:4px 8px;" onclick="portal.modUserStatus('${u.u}', 'active')">Approve</button>
                                <button class="btn btn-ghost" style="padding:4px 8px; color:red;" onclick="portal.modUserStatus('${u.u}', 'del')">Remove</button>
                            </td>
                        </tr>
                    `);
                });
            },

            modUserStatus(username, action) {
                if (action === 'del') this.store.users = this.store.users.filter(u => u.u !== username);
                else this.store.users.find(u => u.u === username).s = 'active';
                this.persist();
                this.renderUserRegistry();
            },

            initializeConfigUI() {
                ['languages', 'statuses'].forEach(key => {
                    const select = document.getElementById(key === 'languages' ? 'f-lang' : 'f-status');
                    select.innerHTML = this.store.config[key].map(opt => `<option value="${opt}">${opt}</option>`).join('') + `<option value="NEW">+ Custom</option>`;
                });
            },

            handleDynamicConfig(select, type) {
                if (select.value === 'NEW') {
                    const val = prompt(`New ${type}:`);
                    if (val) {
                        this.store.config[type].push(val);
                        this.persist();
                        this.initializeConfigUI();
                        select.value = val;
                    }
                }
            },

            search(query) {
                const q = query.toLowerCase();
                this.renderRecords(this.store.records.filter(r => r.name.toLowerCase().includes(q) || r.street.toLowerCase().includes(q)));
            },

            updateAnalytics() {
                ['T1','T2','T3'].forEach(t => {
                    document.getElementById('val-' + t.toLowerCase()).innerText = this.store.records.filter(r => r.territory === t).length;
                });
                document.getElementById('val-all').innerText = this.store.records.length;
            },

            exportCSV() {
                let csv = "TERRITORY,STREET,UNIT,NAME,STATUS,LANG,REMARKS\n";
                this.store.records.forEach(r => csv += `"${r.territory}","${r.street}","${r.unit}","${r.name}","${r.status}","${r.lang}","${r.remarks}"\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `G4_Report.csv`;
                a.click();
            },

            persist() {
                localStorage.setItem('g4_enterprise_core', JSON.stringify(this.store));
            }
        };

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
